search_space:
  learning_rate:
    type: loguniform
    low: 1.0e-5
    high: 5.0e-5
  batch_size:
    type: choice
    values: [8, 16, 32]
  dropout:
    type: uniform
    low: 0.1
    high: 0.3
  num_train_epochs:
    type: int
    low: 2
    high: 5
  weight_decay:
    type: uniform
    low: 0.0
    high: 0.1
  warmup_steps:
    type: int
    low: 0
    high: 1000
  max_seq_length:
    type: choice
    values: [128, 256, 512]
