# Hyperparameter search spaces for transformer models

search_spaces:
  # Common search space for all transformer models
  common:
    learning_rate:
      type: float
      low: 1.0e-5
      high: 5.0e-5
      log: true
      description: "Learning rate for AdamW optimizer"
    
    batch_size:
      type: categorical
      choices: [8, 16, 32]
      description: "Batch size for training"
    
    dropout:
      type: float
      low: 0.1
      high: 0.3
      description: "Dropout rate for classification head"
    
    num_train_epochs:
      type: int
      low: 2
      high: 5
      description: "Number of training epochs"
    
    weight_decay:
      type: float
      low: 0.0
      high: 0.1
      description: "Weight decay for optimizer"
    
    warmup_steps:
      type: int
      low: 0
      high: 1000
      description: "Number of warmup steps"
    
    max_seq_length:
      type: categorical
      choices: [128, 256, 512]
      description: "Maximum sequence length"
  
  # Model-specific overrides (if needed)
  bert: {}
  roberta: {}
  deberta: {}
  xlnet: {}
  electra: {}
  albert: {}
  distilbert: {}
  gpt2: {}
