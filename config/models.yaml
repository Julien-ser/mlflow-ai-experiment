# Model Zoo Configuration
# Defines hyperparameter configurations for different transformer model families

model_zoo:
  bert:
    base:
      model_name: "bert-base-uncased"
      dropout: 0.1
      learning_rate: 2e-5
      batch_size: 16
      max_seq_length: 512
      num_train_epochs: 3
      weight_decay: 0.01
      warmup_steps: 500
